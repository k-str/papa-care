      .map(line => {
        if (!line.trim()) return '<br>';
        if (line.startsWith('【') && line.includes('】')) {
          return `<h4>${line}</h4>`;
        }
        return `<p>${line}</p>`;
      })
      .join('');
    bodyEl.innerHTML = html;

    // 他のテーマナビ
    const grid = document.getElementById('topicNavGrid');
    TOPICS.forEach((t, i) => {
      const a = document.createElement('a');
      a.href = `/sample.html?id=${i}`;
      a.className = 'topic-nav-chip' + (i === idx ? ' active' : '');
      a.textContent = `${t.emoji} ${t.label}`;
      grid.appendChild(a);
    });
  </script>

</body>
</html>
